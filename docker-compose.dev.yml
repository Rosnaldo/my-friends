
services:
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
      - mongo
      - keycloak
    volumes:
      # Main nginx config
      - ./apps/nginx/dev/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./apps/nginx/dev/certs:/etc/nginx/certs:ro
      - ./apps/web/dist:/etc/nginx/html
      - ./apps/admin/dist:/etc/nginx/html/myadmin
      - s3_cache:/var/cache/nginx
    networks:
      - frontend
      - backend

  api:
    image: api
    container_name: api
    pull_policy: build
    build:
      context: .
      dockerfile: apps/api/dockerfile.dev
    ports:
      - "5002:5002"
    env_file:
      - ./apps/api/.env
      - ./apps/api/.env.dev
    restart: unless-stopped
    volumes:
      - ./apps/api:/app/apps/api
      - /app/apps/api/node_modules
    depends_on:
      mongo:
        condition: service_healthy
        restart: true
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:5002/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - backend
  
  postgres:
    image: postgres:18rc1
    pull_policy: always
    restart: no
    ports:
      - 5432:5432
    shm_size: 128m
    env_file :
      - ./apps/authentication/.env
    volumes:
      - keycloak_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $$POSTGRES_DB -U $$POSTGRES_USER"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    networks:
      - backend

  keycloak:
    container_name: keycloak
    image: quay.io/keycloak/keycloak:26.4
    pull_policy: always
    restart: no
    ports:
      - 8080:8080
    env_file :
      - ./apps/authentication/.env
      - ./apps/authentication/.env.dev
    volumes:
      # Themes customizados
      - ./apps/authentication/my-themes:/opt/keycloak/themes
      - ./apps/authentication/realm-export.json:/opt/keycloak/data/import/realm-export.json
    command: [
      "start-dev", 
      "--spi-theme-cache-themes=false",
      "--spi-theme-cache-templates=false",
      "--spi-theme-static-max-age=-1",
      "--http-port=8080", 
      "--hostname-debug=true",
      "--health-enabled=true",
      "--verbose",
      "--db=postgres",
      "--db-url=jdbc:postgresql://postgres:5432/$${DB_POSTGRES_SPACE}",
      "--db-password=$${DB_POSTGRES_PASSWORD}",
      "--db-username=$${DB_POSTGRES_USER}",
      "--import-realm",
    ]
    depends_on:
      postgres:
        condition: service_healthy
        restart: true
    networks:
      - frontend
      - backend

  mailhog:
    image: mailhog/mailhog:latest
    container_name: mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # UI
    restart: unless-stopped
    networks:
      - backend

  mongo:
    image: mongo:8.0.14-noble
    pull_policy: always
    restart: no
    ports:
      - 27017:27017
    env_file:
      - ./apps/api/.env.dev
    volumes:
      - mongodb:/data/db
    healthcheck:
      test: [ "CMD-SHELL", "mongosh --quiet --authenticationDatabase admin --username $${MONGO_INITDB_ROOT_USERNAME} --password $${MONGO_INITDB_ROOT_PASSWORD} localhost:27017/test --eval 'quit(db.runCommand({ ping: 1 }).ok ? 0 : 2)'" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - backend

volumes:
  keycloak_postgres:
    name: nanithefuck_keycloak_postgres
  mongodb:
    name: nanithefuck_mongodb
  web_build:
    name: nanithefuck_web_build
  s3_cache:
    name: nanithefuck_s3_cache

networks:
  frontend:
  backend: